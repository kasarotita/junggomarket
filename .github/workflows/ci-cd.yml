name: 중고마켓 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kasarotita/junggomarket

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          cd backend
          python -m py_compile main.py
          echo "✅ Backend syntax OK"

      - name: Build Docker image
        run: |
          cd backend
          docker build -t ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} .
          docker tag ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Trivy 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend build OK"

      - name: Build Docker image
        run: |
          cd frontend
          docker build -t ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} .
          docker tag ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Trivy 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest

  notify:
    name: 완료 알림
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 결과 출력
        run: |
          echo "Backend: ${{ needs.backend-ci.result }}"
          echo "Frontend: ${{ needs.frontend-ci.result }}"
          if [ "${{ needs.backend-ci.result }}" = "success" ] && \
             [ "${{ needs.frontend-ci.result }}" = "success" ]; then
            echo "✅ 전체 CI/CD 파이프라인 성공"
          else
            echo "❌ 일부 실패"
            exit 1
          fi
