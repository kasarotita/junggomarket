name: 중고마켓 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/kasarotita/junggomarket-backend
  FRONTEND_IMAGE: ghcr.io/kasarotita/junggomarket-frontend

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 문법 검사
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치 및 검사
        run: |
          cd backend
          pip install -r requirements.txt
          python -m py_compile main.py
          echo "✅ Backend OK"

      - name: Docker 이미지 빌드
        run: |
          cd backend
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Trivy 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: ghcr.io 로그인
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 Push
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest
          echo "✅ Backend 이미지 Push 완료"

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치 및 빌드
        run: |
          cd frontend
          npm ci
          CI=false npm run build
          echo "✅ Frontend build OK"

      - name: Docker 이미지 빌드
        run: |
          cd frontend
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Trivy 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: ghcr.io 로그인
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 Push
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          echo "✅ Frontend 이미지 Push 완료"

  deploy-check:
    name: 배포 준비 확인
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 완료
        run: |
          echo "✅ ghcr.io에 이미지 Push 완료"
          echo "Backend: ghcr.io/kasarotita/junggomarket-backend:latest"
          echo "Frontend: ghcr.io/kasarotita/junggomarket-frontend:latest"
          echo "ArgoCD가 자동으로 클러스터에 배포합니다"
